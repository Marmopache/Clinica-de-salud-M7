{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>{{ form.instance.id|yesno:"Editar Hora,Nueva Hora" }}</h3>
            <a href="{% url 'hora_list' %}" class="btn btn-secondary shadow-sm">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3">
                <button type="submit" class="btn btn-estandar shadow-sm">
                    <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                </button>
                <a href="{% url 'hora_list' %}" class="btn btn-secondary shadow-sm">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
