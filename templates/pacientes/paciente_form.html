{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h3 class="mb-4">
            <i class="fa-solid fa-user-injured me-2"></i>
            {{ form.instance.id|yesno:"Editar Paciente,Nuevo Paciente" }}
        </h3>

        <form method="POST" class="needs-validation" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            
            <div class="d-flex justify-content-start mt-3">
                <button type="submit" class="btn btn-estandar me-2 shadow-sm">
                    <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                </button>
                <a href="{% url 'paciente_list' %}" class="btn btn-secondary shadow-sm">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
