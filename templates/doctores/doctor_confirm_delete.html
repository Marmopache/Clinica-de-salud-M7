{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-danger">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> Eliminar Médico
            </h3>
            <a href="{% url 'hora_list' %}" class="btn btn-secondary shadow-sm">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <p class="mt-3">
            ¿Estás seguro que deseas eliminar al médico:
            <strong>{{ object.nombre }} {{ object.apellido }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger shadow-sm">
                <i class="fa-solid fa-trash me-1"></i> Sí, eliminar
            </button>
            <a href="{% url 'hora_list' %}" class="btn btn-secondary shadow-sm">
                Cancelar
            </a>
        </form>
    </div>

</div>
{% endblock %}
